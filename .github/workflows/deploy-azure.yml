name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_LOCATION: centralindia
  RESOURCE_GROUP: rg-vyaparai-prod
  BICEP_FILE: infra/bicep/main.bicep
  API_APP_NAME: vyaparai-api
  WEB_APP_NAME: vyaparai-web
  ACR_NAME: vyaparaiacr
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # --- Azure login (OIDC — configure federated credential on the app registration) ---
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # --- Infrastructure (Bicep) ---
      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ${{ env.BICEP_FILE }}
          parameters: >
            environmentName=prod
            location=${{ env.AZURE_LOCATION }}
            apiAppName=${{ env.API_APP_NAME }}
            webAppName=${{ env.WEB_APP_NAME }}
            postgresAdminLogin=${{ secrets.POSTGRES_ADMIN_LOGIN }}
            postgresAdminPassword=${{ secrets.POSTGRES_ADMIN_PASSWORD }}

      # --- Build & push container images to ACR ---
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push API image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/vyaparai-api:${{ env.IMAGE_TAG }} ./backend
          docker push ${{ env.ACR_NAME }}.azurecr.io/vyaparai-api:${{ env.IMAGE_TAG }}

      - name: Build and push Web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://${{ env.API_APP_NAME }}.azurewebsites.net \
            -t ${{ env.ACR_NAME }}.azurecr.io/vyaparai-web:${{ env.IMAGE_TAG }} ./frontend
          docker push ${{ env.ACR_NAME }}.azurecr.io/vyaparai-web:${{ env.IMAGE_TAG }}

      # --- Deploy to App Service ---
      - name: Deploy API to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.API_APP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/vyaparai-api:${{ env.IMAGE_TAG }}

      - name: Deploy Web to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/vyaparai-web:${{ env.IMAGE_TAG }}

      # --- Post-deploy smoke test ---
      - name: Smoke test API health
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "https://${{ env.API_APP_NAME }}.azurewebsites.net/health"

# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   AZURE_CLIENT_ID          — federated app registration client ID
#   AZURE_TENANT_ID          — Entra tenant ID
#   AZURE_SUBSCRIPTION_ID    — target Azure subscription
#   POSTGRES_ADMIN_LOGIN     — PostgreSQL admin username
#   POSTGRES_ADMIN_PASSWORD  — PostgreSQL admin password
#
# Required Azure setup (one-time):
#   1. Create resource group: az group create -n rg-vyaparai-prod -l centralindia
#   2. Create ACR: az acr create -n vyaparaiacr -g rg-vyaparai-prod --sku Basic
#   3. Configure OIDC federated credential for this repo on the app registration
#   4. Grant the service principal Contributor on rg-vyaparai-prod
#   5. Populate Key Vault secrets after first deploy (see infra/bicep/main.bicep outputs)
