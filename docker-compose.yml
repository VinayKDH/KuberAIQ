services:
  postgres:
    image: postgres:16-alpine
    container_name: kuberaiq-postgres
    environment:
      POSTGRES_USER: kuberaiq
      POSTGRES_PASSWORD: kuberaiq
      POSTGRES_DB: kuberaiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuberaiq -d kuberaiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: kuberaiq-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://kuberaiq:kuberaiq@postgres:5432/kuberaiq
      USE_MOCK_AUTH: "true"
      USE_MOCK_LLM: "true"
      USE_MOCK_BLOB: "true"
      USE_MOCK_WHATSAPP: "true"
      USE_MOCK_BILLING: "true"
      JWT_SECRET: dev-only-change-me
      ENVIRONMENT: local
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_USE_MOCK_AUTH: "true"
    container_name: kuberaiq-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
